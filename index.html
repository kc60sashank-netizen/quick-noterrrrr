 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quick Note Taker</title>
    <style>
        *{box-sizing: border-box; margin: 0; padding: 0;}
        
        /* Define Dynamic Theme Variable Palettes */
        :root {
            --bg-color: #f4f4f4;
            --container-bg: white;
            --text-color: #333333;
            --border-color: #dddddd;
            --textarea-bg: white;
            --item-hover: #f0f0f0;
            --item-active: #eef2f7;
        }

        body.dark-theme {
            --bg-color: #181a1b;
            --container-bg: #242729;
            --text-color: #e8e6e3;
            --border-color: #3c4144;
            --textarea-bg: #1c1e1f;
            --item-hover: #2d3134;
            --item-active: #373c40;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.2s, color 0.2s;
        }

        .container {
            display: flex;
            flex: 1;
            gap: 20px;
            margin-top: 10px;
            overflow: hidden;
        }

        #sidebar {
            width: 280px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: var(--container-bg);
            transition: background 0.2s, border-color 0.2s;
        }

        #search-bar {
            width: 100%;
            padding: 8px 10px;
            margin-top: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--textarea-bg);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        #search-bar:focus, #category-filter:focus, #note-category-select:focus, #dictation-lang:focus {
            border-color: #316357;
        }

        #category-filter {
            width: 100%;
            padding: 6px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--textarea-bg);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
        }

        #note-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 5px;
        }

        .note-item {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 14px;
            position: relative;
            color: var(--text-color);
            border-radius: 4px;
            margin-bottom: 4px;
        }

        .note-item:hover {
            background: var(--item-hover);
        }

        .note-item.active {
            background: var(--item-active);
            font-weight: bold;
        }

        .category-badge {
            display: inline-block;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .badge-none { background: #888888; }
        .badge-work { background: #4a90e2; }
        .badge-personal { background: #e24a84; }
        .badge-ideas { background: #f5a623; }
        .badge-todo { background: #2ecc71; }

        .note-actions {
            position: absolute;
            right: 5px;
            top: 12px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }

        .note-actions button {
            border: none;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            color: white;
            transition: background 0.2s, transform 0.2s;
        }

        .popout-btn { background: #4a90e2; }
        .popout-btn:hover { background: #357abd; }

        .pin-btn { background: #7f8c8d; }
        .pin-btn:hover { background: #626d6e; }
        .note-item.pinned .pin-btn {
            background: #316357;
            transform: rotate(-45deg);
        }

        .delete-btn { background: #ff4d4d; }
        .delete-btn:hover { background: #e60000; }

        .note-item.pinned {
            border-left: 4px solid #316357;
            padding-left: 6px;
        }

        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-selector-container {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
            font-size: 14px;
        }

        #note-category-select, #dictation-lang {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--textarea-bg);
            color: var(--text-color);
            outline: none;
            font-size: 13px;
        }

        textarea {
            width: 100%;
            flex: 1;
            font-size: 16px;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background: var(--textarea-bg);
            color: var(--text-color);
            resize: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .controls { margin-top: 10px; }

        button {
            padding: 8px 15px;
            font-size: 14px;
            background: #316357;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover { background: #254d43; }

        #save_status {
            font-size: 14px;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 5px;
        }

        #word-count {
            font-size: 13px;
            color: var(--text-color);
            opacity: 0.8;
            margin-top: 5px;
        }

        button#theme-toggle { background: #555555; }
        button#theme-toggle:hover { background: #444444; }
        body.dark-theme button#theme-toggle { background: #f4f4f4; color: #333333; }
        body.dark-theme button#theme-toggle:hover { background: #e0e0e0; }

        /* Voice Layout CSS Configurations */
        button#dictation-toggle { background: #2980b9; }
        button#dictation-toggle:hover { background: #1f618d; }
        button#dictation-toggle.recording { background: #e74c3c !important; }

        button#trash-toggle {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            font-size: 20px;
            background: #c0392b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.18);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 60;
        }
        button#trash-toggle:hover { background: #922b21; }

        .trash-panel {
            position: fixed;
            right: 20px;
            bottom: 90px;
            width: 300px;
            max-height: 360px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.2);
            padding: 12px;
            display: none;
            flex-direction: column;
            z-index: 55;
        }
        .trash-panel.visible { display: flex; }
        .trash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 700;
        }
        .trash-list {
            flex: 1;
            overflow-y: auto;
            max-height: 220px;
        }
        .trash-item {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--textarea-bg);
        }
        .trash-item-title { font-size: 13px; font-weight: 600; }
        .trash-item-actions { display: flex; gap: 4px; align-items: center; }
        .trash-item-actions button {
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            color: white;
        }
        .trash-item-actions button.restore { background: #27ae60; }
        .trash-item-actions button.delete { background: #c0392b; }
        .trash-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
        button#empty-trash { background: #a93226; }
    </style>
</head>
<body>
    <h1>📝 Quick Note Taker</h1>

    <div class="container">
        <div id="sidebar">
            <h3 style="margin-top:0">My Notes</h3>
            <input type="text" id="search-bar" placeholder="🔍 Search by title or content...">
            
            <select id="category-filter">
                <option value="all">📁 All Categories</option>
                <option value="none">📄 Uncategorized</option>
                <option value="work">💼 Work</option>
                <option value="personal">🏠 Personal</option>
                <option value="ideas">💡 Ideas</option>
                <option value="todo">✅ To-Do</option>
            </select>

            <div id="note-list"></div>
        </div>

        <div class="editor">
            <p id="save_status">Ready</p>
            
            <div id="toolbar">
                <button id="open-file">📂 Open File</button>
                <button id="save">💾 Save Note</button>
                <button id="save-as">💾 Save As</button>
                <button id="font-increase">A+</button>
                <button id="font-decrease">A-</button>
                <button id="theme-toggle" class="action-btn">🌓 Toggle Theme</button>

                <button id="dictation-toggle">🎙️ Start Dictation</button>
                <select id="dictation-lang" title="Select Voice Input Language">
                    <option value="en-US">🇺🇸 English</option>
                    <option value="ko-KR">🇰🇷 한국어</option>
                </select>

                <div class="category-selector-container">
                    <label for="note-category-select">Tag:</label>
                    <select id="note-category-select">
                        <option value="none">None</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="ideas">Ideas</option>
                        <option value="todo">To-Do</option>
                    </select>
                </div>
            </div>

            <textarea id="note" placeholder="Start typing your note..."></textarea>
            <p id="word-count">Words: 0 | Characters: 0</p>

            <div class="controls">
                <button id="new-note">📄 New Note</button>
            </div>
        </div>
    </div>

    <button id="trash-toggle" title="Open Trash Bin">🗑️</button>
    <div id="trash-panel" class="trash-panel">
        <div class="trash-header">
            <span>Trash Bin</span>
            <span id="trash-count">0 items</span>
        </div>
        <div id="trash-list" class="trash-list">
            <p style="font-size:12px;color:gray;">Trash is empty.</p>
        </div>
        <div class="trash-footer">
            <button id="empty-trash">Empty Trash</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
